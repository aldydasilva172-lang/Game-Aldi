<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Buzzer Cepat Jawab</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  color: white;
}

button {
  font-size: 20px;
  padding: 25px;
  margin: 10px;
  border: none;
  border-radius: 10px;
}
input {
  width: 280px;
  height: 45px;
  font-size: 18px;
  border-radius: 20px;
  border: none;
  outline: none;
  text-align: center;
}

.buzzer {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: limegreen;
  font-size: 30px;
}

.admin {
  background: red;
  color: white;
}
</style>
</head>

<body>

<h1>🎮 GAME RM KEMAN 🎮</h1>

<input type="text" id="nama" placeholder="Masukan nama"><br><br>

<button id="btn" class="buzzer">TEKAN!</button>

<h2 id="status"></h2>

<hr>

<h2>🔐 Admin</h2>
<input type="password" id="adminPass" placeholder="Password"><br><br>

<button class="admin" onclick="resetGame()">Reset Ronde</button>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyXXXX",
  authDomain: "game-aldi.firebaseapp.com",
  databaseURL: "https://game-aldi-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================= VARIABLE =================
const btn = document.getElementById("btn");
const status = document.getElementById("status");
let namaPlayer = "";

// ================= CLICK =================
btn.onclick = function() {
  const nama = document.getElementById("nama").value;
  if (!nama) return alert("Isi nama dulu!");

  namaPlayer = nama;

  db.ref("game").once("value", snap => {
    if (!snap.val() || !snap.val().clicked) {

      db.ref("game").set({
        clicked: true,
        winner: nama
      });

    }
  });
};

// ================= LISTENER =================
db.ref("game").on("value", snap => {
  const data = snap.val() || {};

  if (data.clicked) {
    btn.disabled = true;

    if (data.winner === namaPlayer) {
      status.innerText = "✅ Kamu yang jawab!";
      btn.style.background = "blue";
    } else {
      status.innerText = "❌ Kamu Kalah Cepet Dari : " + data.winner;
      btn.style.background = "red";
    }

  } else {
    btn.disabled = false;
    status.innerText = "";
    btn.style.background = "limegreen";
  }
});

// ================= ADMIN =================
function cekAdmin() {
  return document.getElementById("adminPass").value === "0000";
}

function resetGame() {
  if (!cekAdmin()) return alert("Password salah!");
  db.ref("game").set({ clicked: false, winner: "" });
}
</script>

</body>
</html>
