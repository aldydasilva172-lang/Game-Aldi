<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>GAME ALDI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  color: white;
}

.buzzer {
  width: 250px;
  height: 250px;
  border-radius: 50%;
  background: limegreen;
  font-size: 30px;
  cursor: pointer;
}

.buzzer:active {
  transform: scale(0.95);
}

input {
  width: 250px;
  height: 40px;
  border-radius: 10px;
  text-align: center;
  font-size: 18px;
}

button {
  padding: 15px;
  margin: 10px;
  border: none;
  border-radius: 10px;
}

.admin {
  background: red;
  color: white;
}
</style>
</head>

<body>

<h1>🎮 RM KEMANG GAME</h1>

<input type="text" id="nama" placeholder="Masukan nama"><br><br>

<button id="btn" class="buzzer">TEKAN!</button>

<h2 id="status"></h2>

<hr>

<h3>🔐 Admin</h3>
<input type="password" id="adminPass" placeholder="Password"><br><br>
<button class="admin" onclick="resetGame()">Reset Ronde</button>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyXXXX",
  authDomain: "game-aldi.firebaseapp.com",
  databaseURL: "https://game-aldi-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const btn = document.getElementById("btn");
const status = document.getElementById("status");

let namaPlayer = "";

// ================= CLICK (ANTI TABRAKAN + GETAR)
btn.onclick = function() {
  const nama = document.getElementById("nama").value;
  if (!nama) return alert("Isi nama dulu!");

  // 🔥 EFEK GETAR
  if (navigator.vibrate) {
    navigator.vibrate([100, 50, 100]); // pola getar
  }

  namaPlayer = nama;

  const gameRef = db.ref("game");

  gameRef.transaction(current => {
    if (current === null || current.clicked === false) {
      return {
        clicked: true,
        winner: nama,
        time: firebase.database.ServerValue.TIMESTAMP
      };
    }
    return; // kalau sudah ada pemenang
  });
};

// ================= LISTENER REALTIME
db.ref("game").on("value", snap => {
  const data = snap.val() || {};

  if (data.clicked) {
    btn.disabled = true;

    if (data.winner === namaPlayer) {
      status.innerText = "✅ KAMU BOLEH JAWAB!";
      btn.style.background = "blue";
    } else {
      status.innerText = "❌ KALAH CEPET, DARI: " + data.winner;
      btn.style.background = "red";
    }

  } else {
    btn.disabled = false;
    status.innerText = "";
    btn.style.background = "limegreen";
  }
});

// ================= ADMIN
function cekAdmin() {
  return document.getElementById("adminPass").value === "00";
}

function resetGame() {
  if (!cekAdmin()) return alert("Password salah!");
  db.ref("game").set({ clicked: false });
}
</script>

</body>
</html>
